name: Daily Update

on:
  schedule:
    - cron: '0 20 * * *' # 布里斯本清晨 6:00 執行
  workflow_dispatch: # 允許你隨時手動點擊執行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install beautifulsoup4 pytz
      - name: Run scraper
        run: python scraper.py
      - name: Commit and Push
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git add index.html
          git commit -m "Update school data" || exit 0
          git push
